name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OpenMP (required by LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install project with dev + serve extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short
